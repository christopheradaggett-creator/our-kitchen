<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Our Kitchen">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1410">
<link rel="manifest" href="/our-kitchen/manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Kitchen</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f3ee;--surface:#ffffff;--ink:#1c1410;--muted:#8a7a6a;
  --border:#e4d9cc;--terra:#b85c2a;--sage:#4a7c59;--sky:#2e7d9c;
  --plum:#8b3a8b;--gold:#c49a2a;--warm:#f0e6d6;--nav:#1c1410;
}
html,body{height:100%;background:var(--bg);font-family:'Jost',sans-serif;color:var(--ink);}
/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}

/* Layout */
.app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--nav);color:#f7f3ee;padding:0 20px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:50;height:52px;}
.topbar-brand{font-family:'Cormorant Garamond',serif;font-size:1.35rem;letter-spacing:.01em;margin-right:auto;white-space:nowrap;}
.topbar-brand em{color:#d4956a;font-style:italic;}
.tab-btn{background:none;border:none;color:rgba(247,243,238,.55);font-family:'Jost',sans-serif;font-size:.75rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:0 14px;height:52px;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;white-space:nowrap;}
.tab-btn:hover{color:#f7f3ee;}
.tab-btn.active{color:#f7f3ee;border-bottom-color:var(--terra);}
.content{flex:1;max-width:1080px;margin:0 auto;width:100%;padding:28px 20px;}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;transition:box-shadow .2s,transform .2s;cursor:pointer;}
.card:hover{box-shadow:0 6px 24px rgba(28,20,16,.1);transform:translateY(-2px);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;margin-bottom:5px;}
.card-desc{font-size:.82rem;color:var(--muted);line-height:1.5;margin-bottom:12px;}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.pill{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:.68rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;}
.pill-cat{color:#fff;}
.pill-tag{background:var(--warm);color:var(--muted);}
.time-chip{margin-left:auto;font-size:.75rem;color:var(--muted);}

/* Section header */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:24px;padding:9px 20px;font-family:'Jost',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-primary{background:var(--terra);color:#fff;}
.btn-primary:hover{background:#9e4d22;}
.btn-secondary{background:var(--warm);color:var(--ink);}
.btn-secondary:hover{background:#e4d4be;}
.btn-ghost{background:none;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--terra);color:var(--terra);}
.btn-sm{padding:5px 14px;font-size:.75rem;}

/* Filters bar */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.filter-select{border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-family:'Jost',sans-serif;font-size:.78rem;background:white;cursor:pointer;outline:none;color:var(--ink);}
.filter-select:focus{border-color:var(--terra);}
.search-input{border:1px solid var(--border);border-radius:20px;padding:7px 16px;font-family:'Jost',sans-serif;font-size:.82rem;outline:none;color:var(--ink);flex:1;min-width:150px;max-width:260px;}
.search-input:focus{border-color:var(--terra);}

/* Star ratings */
.stars{display:flex;gap:2px;}
.star{background:none;border:none;font-size:1rem;cursor:pointer;padding:0;line-height:1;transition:transform .1s;}
.star:hover{transform:scale(1.2);}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(28,20,16,.6);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.modal{background:white;border-radius:16px;width:100%;max-width:620px;position:relative;margin:auto;}
.modal-header{padding:24px 24px 0;display:flex;align-items:flex-start;gap:12px;}
.modal-body{padding:20px 24px 24px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;flex:1;line-height:1.2;}
.modal-close{background:var(--warm);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px;}
.section-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--terra);margin:16px 0 8px;}
.ingredient-list{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.ingredient-item{font-size:.85rem;color:#3a2e22;padding:4px 0;border-bottom:1px solid var(--bg);display:flex;align-items:center;gap:6px;}
.ingredient-item::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--terra);flex-shrink:0;}
.step-item{display:flex;gap:12px;margin-bottom:10px;font-size:.87rem;line-height:1.6;color:#3a2e22;}
.step-num{width:22px;height:22px;background:var(--terra);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;flex-shrink:0;margin-top:2px;}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}

/* Rating grid */
.rating-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
.rating-cell{background:var(--bg);border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:4px;}
.rating-name{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
.avg-rating{display:flex;align-items:center;gap:6px;font-size:.82rem;}
.avg-num{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--terra);}

/* Cook history */
.history-chip{display:inline-block;background:var(--warm);border-radius:6px;padding:3px 10px;font-size:.75rem;color:var(--muted);margin:2px;}

/* Form */
.form-row{display:grid;gap:12px;}
.form-row-2{grid-template-columns:1fr 1fr;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);}
.finput,.ftextarea,.fselect{border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-family:'Jost',sans-serif;font-size:.87rem;outline:none;color:var(--ink);transition:border .2s;background:white;}
.finput:focus,.ftextarea:focus,.fselect:focus{border-color:var(--terra);}
.ftextarea{resize:vertical;min-height:80px;}
.fselect{cursor:pointer;}
.form-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}

/* AI Panel */
.ai-box{background:var(--ink);border-radius:14px;padding:24px;color:#f7f3ee;margin-bottom:28px;}
.ai-box-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;margin-bottom:4px;}
.ai-box-sub{font-size:.8rem;color:#aaa;margin-bottom:16px;}
.ai-row{display:flex;gap:8px;}
.ai-input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:11px 15px;color:white;font-family:'Jost',sans-serif;font-size:.87rem;outline:none;transition:border .2s;}
.ai-input::placeholder{color:#666;}
.ai-input:focus{border-color:var(--terra);}
.ai-go{background:var(--terra);color:white;border:none;border-radius:9px;padding:11px 20px;font-family:'Jost',sans-serif;font-weight:500;cursor:pointer;transition:background .2s;white-space:nowrap;}
.ai-go:disabled{opacity:.45;cursor:not-allowed;}
.ai-go:not(:disabled):hover{background:#9e4d22;}
.ai-result{margin-top:16px;background:rgba(255,255,255,.07);border-radius:9px;padding:18px;font-size:.87rem;line-height:1.75;color:#e8ddd0;white-space:pre-wrap;}
.typing{display:flex;gap:5px;align-items:center;margin-top:14px;}
.typing span{width:7px;height:7px;background:#666;border-radius:50%;animation:pulse 1.1s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* Planner */
.planner-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
.planner-col{background:white;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.planner-day{background:var(--ink);color:#f7f3ee;text-align:center;padding:8px 4px;font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.planner-day.today{background:var(--terra);}
.planner-slots{padding:8px;min-height:100px;}
.planner-chip{background:var(--warm);border-radius:6px;padding:5px 7px;font-size:.72rem;margin-bottom:5px;display:flex;align-items:flex-start;gap:4px;}
.planner-chip-text{flex:1;line-height:1.3;}
.chip-x{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.85rem;line-height:1;padding:0;flex-shrink:0;}
.planner-add{width:100%;background:none;border:1px dashed var(--border);border-radius:6px;padding:5px;font-size:.7rem;color:var(--muted);cursor:pointer;transition:all .2s;margin-top:2px;}
.planner-add:hover{border-color:var(--terra);color:var(--terra);}
.picker-list{display:flex;flex-direction:column;gap:6px;margin-top:10px;max-height:320px;overflow-y:auto;}
.picker-item{background:var(--warm);border:none;border-radius:8px;padding:9px 14px;text-align:left;cursor:pointer;font-family:'Jost',sans-serif;font-size:.85rem;color:var(--ink);transition:background .15s;display:flex;justify-content:space-between;align-items:center;}
.picker-item:hover{background:var(--terra);color:white;}

/* Export */
.export-panel{background:white;border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;}
.export-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;margin-bottom:8px;}
.export-desc{font-size:.83rem;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.export-actions{display:flex;gap:10px;flex-wrap:wrap;}

/* Photo upload */
.photo-upload{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.photo-upload:hover{border-color:var(--terra);background:var(--bg);}
.photo-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-upload-icon{font-size:2rem;margin-bottom:8px;}
.photo-upload-text{font-size:.83rem;color:var(--muted);}
.photo-preview{max-width:100%;border-radius:8px;margin-top:10px;}

/* Import */
.import-tabs{display:flex;gap:4px;margin-bottom:16px;}
.imp-tab{background:var(--warm);border:none;border-radius:6px;padding:6px 14px;font-family:'Jost',sans-serif;font-size:.78rem;cursor:pointer;color:var(--muted);transition:all .15s;}
.imp-tab.active{background:var(--terra);color:white;}

/* Sample divider */
.sample-divider{display:flex;align-items:center;gap:12px;margin:28px 0 18px;grid-column:1/-1;}
.sample-divider-line{flex:1;height:1px;background:var(--border);}
.sample-divider-label{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap;background:var(--bg);padding:0 4px;}
.sample-badge{font-size:.62rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:var(--warm);color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle;}

/* Preferences */
.prefs-panel{background:white;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;}
.prefs-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;margin-bottom:4px;}
.prefs-sub{font-size:.78rem;color:var(--muted);margin-bottom:14px;}
.prefs-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.prefs-col-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.prefs-col-label.likes{color:var(--sage);}
.prefs-col-label.dislikes{color:var(--terra);}
.prefs-tags{display:flex;flex-wrap:wrap;gap:5px;min-height:28px;margin-bottom:8px;}
.pref-tag{display:inline-flex;align-items:center;gap:4px;border-radius:16px;padding:3px 10px;font-size:.75rem;font-weight:500;}
.pref-tag.like{background:#e8f5e9;color:#2e7d32;}
.pref-tag.dislike{background:#fdecea;color:#b71c1c;}
.pref-tag button{background:none;border:none;cursor:pointer;font-size:.8rem;line-height:1;padding:0;opacity:.6;}
.pref-tag button:hover{opacity:1;}
.pref-input-row{display:flex;gap:6px;}
.pref-input{flex:1;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:'Jost',sans-serif;font-size:.8rem;outline:none;color:var(--ink);}
.pref-input:focus{border-color:var(--sage);}
.pref-input.dislike:focus{border-color:var(--terra);}
.pref-add{border:none;border-radius:20px;padding:5px 14px;font-family:'Jost',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;}
.pref-add.like{background:#e8f5e9;color:#2e7d32;}
.pref-add.dislike{background:#fdecea;color:#b71c1c;}

/* Tweaks / cook log */
.tweaks-box{background:var(--bg);border-radius:10px;padding:14px;margin-top:4px;}
.tweaks-textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Jost',sans-serif;font-size:.85rem;color:var(--ink);resize:vertical;min-height:70px;outline:none;background:white;transition:border .2s;}
.tweaks-textarea:focus{border-color:var(--terra);}
.cook-entry{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.cook-entry:last-child{border-bottom:none;}
.cook-date{font-size:.72rem;font-weight:600;color:var(--muted);min-width:80px;margin-top:2px;}
.cook-note{font-size:.82rem;color:var(--ink);flex:1;line-height:1.5;}
.cook-note-empty{font-size:.78rem;color:var(--muted);font-style:italic;}
.cook-add-row{display:flex;gap:8px;margin-top:10px;align-items:flex-start;}
.cook-note-input{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-family:'Jost',sans-serif;font-size:.82rem;outline:none;color:var(--ink);resize:none;min-height:36px;transition:border .2s;}
.cook-note-input:focus{border-color:var(--terra);}

/* Source badge */
.source-badge{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:500;margin-top:5px;}
.source-badge.trusted{background:#e8f4fd;color:#1565c0;}
.source-badge.normal{background:var(--warm);color:var(--muted);}
.source-badge-star{color:#f9a825;}

/* Trusted sources */
.trusted-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.trusted-chip{display:inline-flex;align-items:center;gap:4px;background:#e8f4fd;color:#1565c0;border-radius:12px;padding:3px 10px;font-size:.75rem;font-weight:500;}
.trusted-chip button{background:none;border:none;cursor:pointer;color:#90a4ae;font-size:.8rem;}


/* Grocery list */
.grocery-modal{max-width:520px;}
.grocery-category{margin-bottom:16px;}
.grocery-category-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--terra);margin-bottom:8px;}
.grocery-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.88rem;color:var(--ink);}
.grocery-item:last-child{border-bottom:none;}
.grocery-check{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.grocery-check.checked{background:var(--sage);border-color:var(--sage);color:white;}
.grocery-item.done span{text-decoration:line-through;opacity:.45;}

/* Custom planner slots */
.custom-slot-header{display:flex;align-items:center;justify-content:space-between;background:var(--sage);color:#fff;padding:8px 10px;font-size:.7rem;font-weight:600;letter-spacing:.05em;}
.custom-slot-name{flex:1;font-size:.75rem;font-weight:600;color:#fff;background:none;border:none;outline:none;cursor:text;font-family:'Jost',sans-serif;}
.add-slot-btn{background:none;border:2px dashed var(--border);border-radius:10px;padding:12px;cursor:pointer;color:var(--muted);font-size:.78rem;font-weight:500;transition:all .2s;text-align:center;width:100%;}
.add-slot-btn:hover{border-color:var(--sage);color:var(--sage);}

/* Mobile */
@media(max-width:680px){
  .topbar{gap:0;overflow-x:auto;}
  .tab-btn{padding:0 10px;font-size:.68rem;}
  .planner-grid{grid-template-columns:repeat(2,1fr);}
  .form-row-2{grid-template-columns:1fr;}
  .ingredient-list{grid-template-columns:1fr;}
  .ai-row{flex-direction:column;}
  .content{padding:20px 14px;}
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

const SAMPLE_RECIPES = [
  { id:"r1", isSample:true, type:"food", title:"Lemon Herb Chicken", category:"everyday", description:"Juicy chicken thighs with roasted lemon and fresh herbs.", time:35, ease:1, ingredients:["4 chicken thighs","2 lemons","fresh thyme","3 garlic cloves","olive oil"], steps:["Marinate chicken in lemon juice, garlic, and thyme for 20 min.","Sear in oven-safe skillet 5 min per side.","Roast at 400 degrees F for 20 min."], tags:["chicken","quick"], ratings:{}, cookHistory:[], pairings:[], notes:"", photo:null, source:"" },
  { id:"r2", isSample:true, type:"food", title:"Creamy Tomato Pasta", category:"everyday", description:"Rich tomato cream sauce tossed with rigatoni.", time:25, ease:1, ingredients:["300g rigatoni","1 can crushed tomatoes","1/2 cup heavy cream","fresh basil","parmesan"], steps:["Cook pasta al dente.","Simmer tomatoes with cream 10 min.","Toss pasta in sauce, finish with basil."], tags:["pasta","vegetarian"], ratings:{Chris:5,Sarah:5,Nora:4,Elizabeth:5,Luke:3}, cookHistory:["2024-11-10","2024-12-01"], pairings:[], notes:"", photo:null, source:"" },
  { id:"r3", isSample:true, type:"food", title:"Grandmas Apple Pie", category:"holiday", description:"Family heirloom recipe from a handwritten index card.", time:90, ease:2, ingredients:["6 apples","1 cup sugar","2 tsp cinnamon","pie crust (top and bottom)","2 tbsp butter"], steps:["Peel and slice apples, toss with sugar and cinnamon.","Line pie dish with crust, fill with apples.","Dot with butter, cover with top crust.","Bake 425 degrees F for 45 min."], tags:["dessert","family"], ratings:{Chris:5,Sarah:5,Nora:5,Elizabeth:5,Luke:5}, cookHistory:["2023-11-23","2024-11-28"], pairings:[], notes:"Family tradition since 1962.", photo:null, source:"" },
  { id:"r4", isSample:false, type:"cocktail", title:"Classic Negroni", category:"treat", description:"Equal parts gin, Campari, sweet vermouth. Stirred, never shaken.", time:5, ease:1, ingredients:["1 oz gin","1 oz Campari","1 oz sweet vermouth","orange peel"], steps:["Combine all spirits over ice in a mixing glass.","Stir for 30 seconds until well chilled.","Strain into rocks glass over large ice cube.","Garnish with expressed orange peel."], tags:["cocktail","classic"], ratings:{Chris:5,Sarah:4}, cookHistory:[], pairings:[], notes:"", photo:null, source:"" },
  { id:"r5", isSample:false, type:"food", title:"Rice Pilaf", category:"everyday", description:"A classic buttery rice pilaf with toasted vermicelli, passed down from Mom.", time:30, ease:1, ingredients:["1 cup long grain white rice","a handful of vermicelli (circumference of 3/4 inch, broken into 1 inch bits)","2 cups chicken broth (no MSG - organic is best)","1/3 stick of butter (never margarine)"], steps:["Heat the broth in one pot until it reaches a gentle boil.","In a second pot, gently melt the butter over medium-low heat - careful, butter burns fast!","Add the rice to the butter and saute until it turns opaque and you hear it clinking in the pot.","Before the rice is fully opaque, add the broken vermicelli and stir constantly until toasted.","Carefully add the hot broth, stir quickly, put on the lid, and reduce flame to LOW.","Cook for 20 minutes. Do not lift the lid or stir."], tags:["rice","sides","family"], ratings:{}, cookHistory:[], pairings:[], notes:"Looks lovely served with a sprinkling of chopped parsley. The Armenians add toasted pine nuts - very nice. Love from Mom", photo:null, source:"" },
  { id:"r6", isSample:false, type:"food", title:"Chicken Fajita Marinade", category:"everyday", description:"A zesty cumin-spiked marinade for chicken fajitas with fresh pico de gallo on the side.", time:30, ease:1, ingredients:["1 pack chicken breast fillets","1/2 cup canola or olive oil","1/4 cup red wine vinegar","1/2 cup salsa (your choice)","2 limes juiced (or more)","cilantro big bunch chopped","1/2 large onion finely chopped","2 cloves garlic minced","1 tsp salt and 1/2 tsp ground black pepper","1/2 tsp cumin","1 tsp sugar","1 tsp dried oregano (or a little more)","Tabasco sauce to taste"], steps:["Combine all marinade ingredients in a bowl or zip-lock bag.","Add chicken fillets and marinate for at least 1 hour or overnight in the fridge.","Grill or pan-fry chicken over high heat until cooked through.","Saute peppers and onions separately.","Slice chicken and serve in warm tortillas with pico de gallo, shredded cheese, sour cream and guacamole."], tags:["chicken","mexican","fajitas"], ratings:{}, cookHistory:[], pairings:["r7"], notes:"Increase all ingredients to your taste and to the amount of chicken used.", photo:null, source:"" },
  { id:"r7", isSample:false, type:"food", title:"Pico de Gallo", category:"everyday", description:"A simple fresh pico de gallo - the perfect accompaniment to fajitas or chips.", time:10, ease:1, ingredients:["chopped onion","chopped tomato","chopped cilantro","lime juice","salt to taste"], steps:["Chop onion, tomato, and cilantro and combine in a bowl.","Add lime juice and salt to taste.","Stir and let sit for 10 minutes before serving."], tags:["mexican","salsa","sides","vegetarian"], ratings:{}, cookHistory:[], pairings:["r6"], notes:"Pairs perfectly with the Chicken Fajita Marinade.", photo:null, source:"" },
  { id:"r8", isSample:false, type:"food", title:"Quick Angel Hair Pasta", category:"everyday", description:"Moms fast weeknight pasta with fresh basil, tomatoes, garlic and Romano - very quick and easy.", time:25, ease:1, ingredients:["1 box angel hair pasta","1 can diced tomatoes e.g. Hunts (or dice fresh tomatoes)","1-2 cloves garlic minced","fresh basil leaves chopped large (from produce section)","olive oil","Romano cheese","ground black pepper","salt for boiling pasta","chicken pieces if you like (optional - see note)"], steps:["Fill a large pot with water, add 1 tsp salt and 1 Tb olive oil. Bring to a boil and add pasta.","In a large frying pan, add 1/4 to 1/2 cup olive oil. Heat to medium then add the tomatoes, garlic and chicken if using. Saute for a few moments only.","Drain pasta fully and add to bowl. Add the tomato mixture and toss. Add the basil leaves - the steam will wilt them. Add Romano cheese and black pepper. Toss and serve with salad and bread."], tags:["pasta","quick","weeknight","family"], ratings:{}, cookHistory:[], pairings:[], notes:"VERY QUICK AND EASY. For chicken: slice boneless breasts into strips and saute in olive oil, garlic, salt, pepper and basil - OR - marinate boneless breasts in Italian dressing, cut into strips and saute till cooked. Perdue has packaged pre-cooked chicken with no additives. Love from Mom", photo:null, source:"" },
  { id:"r9", isSample:false, type:"food", title:"Chicken Parm", category:"everyday", description:"Moms classic chicken parm - breaded cutlets fried golden then baked with tomato sauce and double layers of Romano and Mozzarella.", time:60, ease:2, ingredients:["1 package boneless chicken breasts (or buy pre-sliced tenders - they cost more)","2 eggs, lightly beaten with a fork","Italian bread crumbs","grated Romano cheese","shredded Mozzarella cheese","a pasta sauce that you like","canola oil with a little olive oil for frying"], steps:["Pre-heat oven to 350 degrees F.","Slice the cutlets thinly using a boning knife - be careful! Press down to flatten them even more.","Dip the cutlets into the beaten egg, then cover with bread crumbs.","Put about 1/2 inch of oil into the frying pan. Heat the oil until a tiny piece of breaded cutlet sizzles when added - never leave the pan unattended.","Pile up the breaded cutlets on a plate and gently heat the oil. Fry cutlets until golden brown. Careful not to burn them.","In a foil-lined baking dish, layer in this order (twice): cutlets, sauce, sprinkle of Romano, layer of Mozzarella.","Place toothpicks to hold the foil gently over the dish so it does not stick to the cheese.","Bake in pre-heated oven for 30 minutes, depending on quantity."], tags:["chicken","italian","baked","family"], ratings:{}, cookHistory:[], pairings:[], notes:"You can teach yourself to make your own cutlets - it saves money. Use lots of paper towels for soaking up the oil after frying. Love from Mom", photo:null, source:"" },
  { id:"r10", isSample:false, type:"food", title:"Southern-Style Chicken and Waffles", category:"treat", description:"Crispy buttermilk-brined chicken strips on light cornmeal waffles with maple syrup - a sweet and savory showstopper.", time:60, ease:2, ingredients:["2 boneless skinless chicken breasts pounded thin and sliced into strips","1 cup buttermilk","2 tbsp hot sauce","1 tsp salt and pepper","1 cup all-purpose flour","1/4 cup fine cornmeal","1 tsp smoked paprika","oil for shallow frying","1 cup all-purpose flour (waffles)","1 cup fine cornmeal (waffles)","1/2 tsp baking soda (waffles)","2 tsp baking powder (waffles)","2 cups buttermilk (waffles)","2 eggs (waffles)","4 tbsp melted butter (waffles)","1/4 cup maple syrup plus more for serving","1 bunch scallions chopped (waffles)","1 cup shredded cheddar cheese (waffles)","maple syrup or hot honey to serve"], steps:["Brine the chicken: combine buttermilk and hot sauce in a zip-lock bag with seasoned chicken strips. Refrigerate at least 1 hour or overnight.","Make the waffle batter: whisk together flour, cornmeal, baking soda, baking powder and salt. In another bowl mix buttermilk, eggs, melted butter and maple syrup. Combine wet and dry, then fold in cheddar and scallions.","Cook waffles according to your iron instructions until golden and crisp. Keep warm in a 250 degree oven.","Make the dredge: combine flour, cornmeal, paprika, salt and pepper. Remove chicken from brine and dredge in flour mixture.","Heat about 1 inch of oil in a large skillet to 350 degrees. Fry chicken strips in batches until golden brown, about 3-4 min per side. Drain on paper towels.","Serve chicken strips on top of waffles drizzled with warm maple syrup or hot honey."], tags:["chicken","waffles","brunch","american"], ratings:{}, cookHistory:[], pairings:[], notes:"The key is brining the chicken in buttermilk - do not skip this step. Use a dry red wine or hot honey as an alternative to maple syrup for a more savory finish.", photo:null, source:"https://www.garlicandzest.com/southern-style-chicken-and-waffles/" },
  { id:"r11", isSample:false, type:"cocktail", title:"Vanilla Chai Old Fashioned", category:"treat", description:"Homemade spiced chai simple syrup with warming bourbon, winter citrus, a touch of vanilla and fizzy sparkling water.", time:15, ease:1, ingredients:["2 oz bourbon","1-2 oz chai tea syrup (see below)","1 oz lemon juice","1 dash orange bitters","sparkling water to top","cinnamon and star anise to garnish","4 chai tea bags (for syrup)","1/3 cup real maple syrup (for syrup)","1 tsp vanilla extract (for syrup)"], steps:["Make the chai syrup: bring 1 cup water to a boil. Remove from heat, add chai tea bags, cover and steep 10-15 minutes. Remove bags and add maple syrup. Bring to a boil over high heat and boil 3-5 minutes. Remove from heat, stir in vanilla extract. Let cool. Keeps in fridge for 2 weeks.","Add bourbon, chai syrup, lemon juice and bitters to a mixing glass with ice. Stir until well chilled.","Strain into a rocks glass over fresh ice.","Top with a splash of sparkling water. Garnish with cinnamon stick and star anise if desired."], tags:["bourbon","chai","cocktail","winter","thanksgiving"], ratings:{}, cookHistory:[], pairings:[], notes:"Make the syrup ahead and keep in the fridge - then this comes together in minutes. Perfect Thanksgiving cocktail. Via Half Baked Harvest.", photo:null, source:"https://www.halfbakedharvest.com/vanilla-chai-old-fashioned/" },
  { id:"r12", isSample:false, type:"cocktail", title:"NY Sour", category:"treat", description:"A classic whiskey sour elevated with a dramatic red wine float - three stunning layers in one glass.", time:10, ease:1, ingredients:["2 oz rye whiskey (or bourbon)","1 oz fresh lemon juice","3/4 oz simple syrup","1 egg white (optional but recommended)","1/2 oz dry red wine (Shiraz, Malbec or Cabernet) for float","lemon slice and cherry to garnish"], steps:["If using egg white, add it to the shaker first and dry shake vigorously (without ice) for 15-20 seconds to build foam.","Add whiskey, lemon juice, and simple syrup to the shaker. Shake again without ice for 15 seconds.","Add ice and shake hard for another 10-15 seconds until well chilled.","Strain into a rocks glass over fresh ice.","Slowly pour the red wine over the back of a bar spoon held just above the surface of the drink - it should float on top creating a distinct layer.","Garnish with a lemon slice and cherry if desired."], tags:["whiskey","rye","bourbon","sour","cocktail","classic"], ratings:{}, cookHistory:[], pairings:[], notes:"Use a dry red wine for the float - Shiraz, Malbec or Cab Sav work best. Avoid sweet reds as they sink and muddy the flavor. The three-shake technique is key for a good egg white foam.", photo:null, source:"https://www.wegmans.com/recipes/cocktails/ny-sour-cocktail-2738254" },
  { id:"r13", isSample:false, type:"food", title:"Supreme Strawberry Topping", category:"everyday", description:"A simple 3-ingredient strawberry sauce with fresh berries, sugar and vanilla - perfect over cheesecake, ice cream, pancakes or waffles.", time:15, ease:1, ingredients:["1 pint fresh strawberries, hulled and halved (or use frozen)","1/3 cup sugar","1 tsp vanilla extract"], steps:["Cut about 1/3 of the strawberries in half and leave the rest whole or halved as desired.","In a saucepan over medium-high heat, combine strawberries, sugar and vanilla. Cook stirring occasionally until sauce thickens, about 5 minutes.","Remove from heat. Pour about half the sauce into a blender and puree until smooth, then stir back into the remaining chunky sauce. This gives you the perfect thick-yet-textured consistency.","Cool slightly and serve warm, or refrigerate and serve cold. Sauce thickens more as it cools."], tags:["strawberry","sauce","topping","dessert","quick"], ratings:{}, cookHistory:[], pairings:[], notes:"Can be served over ice cream, cheesecake, pancakes or waffles. Keeps in the fridge for up to a week. Skip the blender step if you prefer it fully chunky. Works with frozen strawberries too.", photo:null, source:"https://www.allrecipes.com/recipe/43914/supreme-strawberry-topping/" },
  { id:"r14", isSample:false, type:"food", title:"Thai Red Curry Noodle Soup", category:"everyday", description:"Better than takeout - tender chicken, rice noodles and a rich coconut-curry broth with cilantro, basil and lime.", time:50, ease:1, ingredients:["1.5 lbs boneless skinless chicken breast, cut into 1-inch chunks","1 tbsp olive oil","3 tbsp red curry paste","1 tbsp fresh ginger, grated","3 green onions, thinly sliced","1 red bell pepper, diced","6 cups low-sodium chicken broth","1 can (14 oz) full-fat coconut milk","1/2 package rice noodles","1 tbsp fish sauce","2 tsp brown sugar","1/2 cup fresh cilantro, chopped","1/4 cup fresh basil, chopped","2 tbsp lime juice","kosher salt and black pepper to taste"], steps:["Heat olive oil in a large pot or Dutch oven over medium-high heat. Add chicken and cook until just browned, about 2-3 minutes. Set aside.","In the same pot, stir in red curry paste and ginger until fragrant, about 1 minute.","Stir in red bell pepper and green onions and cook 1-2 minutes.","Pour in chicken broth and coconut milk, scraping up any browned bits from the bottom. Add the chicken back in. Bring to a boil, then reduce heat and simmer about 10 minutes.","Stir in rice noodles, fish sauce and brown sugar. Cook until noodles are tender, about 5 minutes.","Remove from heat. Stir in green onions, cilantro, basil and lime juice. Season with salt and pepper.","Serve immediately with extra lime wedges and Sriracha on the side."], tags:["thai","soup","noodles","coconut","spicy","weeknight"], ratings:{}, cookHistory:[], pairings:[], notes:"Use full-fat coconut milk for the richest broth. Can sub shrimp or tofu for chicken. For more heat add extra curry paste. Store noodles and broth separately if saving leftovers - noodles get soggy. Thai Kitchen red curry paste is mild; use Mae Ploy for more heat.", photo:null, source:"https://damndelicious.net/2018/04/18/thai-red-curry-noodle-soup/" },
  { id:"r15", isSample:false, type:"food", title:"Robert Irvine French Toast", category:"everyday", description:"Robert Irvine's most-rated Food Network recipe - custard-like brioche French toast with cinnamon, nutmeg and warm maple syrup.", time:30, ease:1, ingredients:["8 slices challah, brioche, or white bread","4 tablespoons butter","4 eggs","1/4 cup milk","1/2 teaspoon vanilla extract","1 teaspoon ground cinnamon","1/4 teaspoon ground nutmeg","2 tablespoons sugar","1/2 cup maple syrup, warmed"], steps:["In a small bowl, combine cinnamon, nutmeg and sugar. Set aside.","In a 10 or 12-inch skillet, melt butter over medium heat. Wait for the bubbles to subside before adding bread - that is when the pan is hot enough.","Whisk together the cinnamon mixture, eggs, milk and vanilla. Pour into a shallow container like a pie plate.","Dip each bread slice in the egg mixture - submerge for only a few seconds and let excess drip off. Do not over-soak.","Fry slices in the buttered skillet until golden brown, then flip and cook the other side.","Serve immediately with warm maple syrup."], tags:["breakfast","brunch","french toast","quick"], ratings:{}, cookHistory:[], pairings:[], notes:"Challah or brioche are the best bread choices - their egginess makes the inside custard-like. Don't over-soak the bread. Make large batches and freeze for quick weekday breakfasts - reheat in the toaster.", photo:null, source:"https://www.foodnetwork.com/recipes/robert-irvine/french-toast-recipe-1951408" },
  { id:"r16", isSample:false, type:"food", title:"Shrimp and Soba Noodle Bowl", category:"healthy", description:"A colorful, healthy bowl with crispy seared shrimp, soba noodles, and tender-crisp veggies tossed in a sesame-sriracha dressing.", time:35, ease:1, ingredients:["1 lb peeled and deveined shrimp","1 package (8 oz) soba noodles","2 cups shredded carrots","2 cups snow peas, trimmed","1/2 red onion, thinly sliced","3 tbsp rice vinegar","2 tbsp sesame oil","2 tbsp soy sauce","1 tsp brown sugar","1-2 tsp Sriracha (to taste)","salt, pepper and garlic powder","2 tbsp canola oil, divided"], steps:["Cook soba noodles according to package directions. Drain and rinse well under cold water to remove starch. Set aside.","Whisk together rice vinegar, sesame oil, soy sauce, brown sugar and Sriracha in a bowl. Set the dressing aside.","Pat shrimp dry with paper towels - this is key for browning. Sprinkle evenly with salt, pepper and garlic powder.","Heat 1 tbsp oil in a large skillet over medium-high. Add shrimp and cook stirring often until slightly crispy and cooked through, 3-4 minutes. Transfer to a plate and cover with foil to keep warm.","Wipe skillet clean and add remaining 1 tbsp oil. Add carrots, snow peas and red onion and cook over medium-high stirring often until tender-crisp, 4-5 minutes. Remove from heat and toss with 3 tbsp of the dressing.","Toss chilled noodles with remaining dressing. Divide among 4 bowls. Top each with the vegetable mixture and shrimp. Serve immediately."], tags:["shrimp","noodles","healthy","asian","weeknight"], ratings:{}, cookHistory:[], pairings:[], notes:"Pat shrimp very dry before cooking - this prevents sogginess and gets a better sear. Rinse soba noodles thoroughly after cooking to remove starch and stop them clumping. Can sub edamame or bok choy for snow peas.", photo:null, source:"https://www.southernliving.com/easy-dinner-bowls-11907525" },
  { id:"r17", isSample:false, type:"food", title:"Giada's Chicken Piccata", category:"everyday", description:"Giada De Laurentiis' classic Italian-American chicken piccata - golden pan-fried cutlets in a bright lemon-caper butter sauce.", time:40, ease:2, ingredients:["2 boneless skinless chicken breasts, butterflied and cut in half (4 pieces total)","all-purpose flour for dredging","salt and freshly ground black pepper","4 tbsp unsalted butter, divided","5 tbsp extra-virgin olive oil, divided","1/3 cup fresh lemon juice (about 2 lemons - start with 1/4 cup if you prefer less tart)","1/2 cup low-sodium chicken stock","1/4 cup capers, rinsed and drained","fresh parsley, chopped for garnish"], steps:["Season both sides of the chicken pieces generously with salt and pepper. Dredge in flour and shake off any excess.","In a large skillet over medium-high heat, melt 2 tbsp butter with 3 tbsp olive oil. Wait until they start to sizzle before adding chicken.","Add 2 pieces of chicken and cook 3 minutes per side until golden brown. Transfer to a plate. Repeat with 2 more tbsp butter, 2 tbsp olive oil and remaining chicken.","Remove skillet from heat. Add lemon juice, chicken stock and capers, scraping up any browned bits from the bottom of the pan.","Return skillet to heat and bring sauce to a boil, stirring. Return chicken to the pan and simmer for 5 minutes, until cooked through and sauce has thickened slightly.","Transfer chicken to a platter. Add remaining 2 tbsp butter to the sauce and whisk until melted. Pour sauce over chicken, garnish with parsley and serve immediately."], tags:["italian","chicken","lemon","capers","weeknight"], ratings:{}, cookHistory:[], pairings:[], notes:"Many reviewers find 1/3 cup lemon juice too tart - start with 1/4 cup and adjust to taste. Serve over angel hair pasta or with mashed potatoes to soak up the sauce. The browned bits from the pan are key to the sauce flavor - scrape them all up.", photo:null, source:"https://www.foodnetwork.com/recipes/giada-de-laurentiis/chicken-piccata-recipe2-1913809" },
  { id:"r18", isSample:false, type:"food", title:"Gas Grilled Baby Back Ribs", category:"everyday", description:"Tender, flavorful baby back ribs on a gas grill using a homemade pork rub and a unique orange marmalade glaze - no smoker needed.", time:90, ease:2, ingredients:["1 rack baby back pork ribs","1/2 cup pork seasoning rub (store-bought or homemade - see notes)","1/2 cup unsweetened apple juice","1/2 cup orange marmalade (or peach/apricot preserves)","1/4 cup apple cider vinegar","nonstick cooking spray","large disposable aluminum tray","FOR HOMEMADE RUB: 1/4 cup brown sugar, 2 tbsp smoked paprika, 1 tbsp garlic powder, 1 tbsp onion powder, 1 tsp black pepper, 1 tsp salt, 1/2 tsp cayenne pepper"], steps:["Pat ribs dry with paper towels. Spray the aluminum tray with nonstick spray and place ribs in the tray. Remove the silver skin membrane from the back of the ribs - grab a corner with a paper towel and pull; it comes off in one piece.","Season both sides generously with the pork rub, pressing and rubbing it in well.","Preheat gas grill to medium-low (around 300 degrees F). Set up for indirect heat - turn on burners on one side only.","Pour apple juice into the bottom of the aluminum tray with the ribs. Cover the tray tightly with foil. Place tray on the indirect heat side of the grill. Close the lid and cook for 45 minutes.","While ribs cook, mix together the orange marmalade and apple cider vinegar to make the glaze.","After 45 minutes, remove ribs from the tray and place directly on the grill grates over indirect heat. Brush generously with the marmalade glaze. Close lid and cook another 30-45 minutes, brushing with more glaze every 15 minutes, until internal temperature reaches 180-190 degrees F and meat pulls away from bones easily.","Let rest 5-10 minutes before slicing and serving."], tags:["ribs","pork","grilling","bbq","summer"], ratings:{}, cookHistory:[], pairings:[], notes:"The orange marmalade glaze might sound unusual but is outstanding - it adds sweetness and a gorgeous thick glaze without drowning out the pork flavor. Peach or apricot preserves also work. Don't rush the cook - low and slow is the key to tender ribs. Internal temp of 180-190F gives the most tender result even though pork is safe at 145F.", photo:null, source:"https://www.thecountrycook.net/how-to-gas-grill-the-best-pork-ribs-easy-method/" },
  { id:"r19", isSample:false, type:"food", title:"Detroit Hot Honey Wings", category:"treat", description:"Detroit-inspired grilled wings glazed with honey while cooking, then tossed in a buttery hot honey sauce - sweet, spicy and finger-licking good.", time:40, ease:1, ingredients:["2 lbs chicken wings tips discarded","1 tsp cayenne pepper (add more to taste)","salt and black pepper to taste","1 cup honey divided","1/2 cup butter melted","1/2 cup hot sauce e.g. Franks RedHot"], steps:["Preheat grill to medium heat and lightly oil the grate.","Pat wings dry. Season with cayenne, salt, and pepper.","Grill wings, brushing liberally with 1/2 cup honey as they cook, until cooked through with juices running clear, about 20-30 minutes.","Mix melted butter, hot sauce and remaining 1/2 cup honey in a large bowl.","Remove wings from grill and immediately toss in the hot honey-butter sauce.","Serve as-is or return to grill for 1 minute per side to set the sauce."], tags:["wings","chicken","grilling","spicy","gameday"], ratings:{}, cookHistory:[], pairings:[], notes:"The double honey hit - glazing on the grill plus the sauce finish - is what makes these special. Adjust cayenne to taste. Can bake at 425 degrees F for 40-45 min if no grill.", photo:null, source:"https://www.allrecipes.com/recipe/142120/detroit-hot-honey-wings/" },
  { id:"r20", isSample:false, type:"cocktail", title:"Manhattan", category:"treat", description:"A classic stirred cocktail - bourbon, sweet vermouth and bitters. Simple, elegant, perfect.", time:5, ease:1, ingredients:["2 oz bourbon (Sazerac preferred)","3/4 oz sweet vermouth (Carpano Antico preferred)","2-3 dashes Angostura bitters","1 Luxardo cherry or orange twist to garnish"], steps:["Add bourbon, vermouth and bitters to a mixing glass filled with ice.","Stir for about 30 seconds until well chilled - do not shake.","Strain into a chilled coupe or rocks glass.","Garnish with a Luxardo cherry or expressed orange twist."], tags:["cocktail","bourbon","classic","stirred"], ratings:{}, cookHistory:[], pairings:[], notes:"Sazerac rye gives a spicier, drier Manhattan. Carpano Antico is richer and more complex than standard Martini & Rossi - worth the upgrade. Always stir, never shake. Ratio can go up to 1 oz vermouth if you like it sweeter.", photo:null, source:"" },
  { id:"r21", isSample:false, type:"cocktail", title:"Aviation", category:"treat", description:"A pre-Prohibition classic with gin, lemon, creme de violette and maraschino - pale violet in color, floral and refreshing.", time:5, ease:1, ingredients:["2 oz gin","3/4 oz fresh lemon juice","1/4 oz maraschino liqueur (Luxardo preferred)","1/4 oz creme de violette (Rothman and Winter preferred)","Luxardo cherry or lemon twist to garnish"], steps:["Chill a coupe glass in the freezer for at least 15 minutes before serving.","Add gin, lemon juice, maraschino liqueur and creme de violette to a cocktail shaker filled with ice.","Shake vigorously for about 20 seconds until very cold.","Strain into the chilled coupe glass.","Garnish with a Luxardo cherry or expressed lemon twist."], tags:["cocktail","gin","classic","floral"], ratings:{}, cookHistory:[], pairings:[], notes:"Standard recipe calls for 1/2 oz maraschino - dialed back to 1/4 oz which lets the creme de violette and gin shine without the sweetness taking over. Rothman and Winter creme de violette has no artificial flavors or colors and gives the best color.", photo:null, source:"https://www.liquor.com/recipes/aviation/", tweaks:"Reduced maraschino liqueur from 1/2 oz to 1/4 oz - much better balance." },
  { id:"r22", isSample:false, type:"cocktail", title:"Rum Punch", category:"everyday", description:"A classic Caribbean rum punch - dark rum, tropical fruit juices, and a grenadine sunset. Easy to scale up for a crowd.", time:5, ease:1, ingredients:["1.25 oz dark or gold rum","2 oz pineapple juice","1 oz orange juice","3/4 oz fresh lime juice","1/2 oz grenadine","brandied or maraschino cherry to garnish","pineapple slice or orange wheel to garnish","freshly grated nutmeg to finish"], steps:["Add rum, pineapple juice, orange juice, lime juice and grenadine to a shaker filled with ice.","Shake well until chilled, about 15 seconds.","Strain into a glass over fresh ice.","Grate a little fresh nutmeg over the top and garnish with a cherry and fruit slice."], tags:["rum","cocktail","tropical","caribbean","punch","crowd"], ratings:{}, cookHistory:[], pairings:[], notes:"Scales up perfectly for a pitcher or punch bowl - just multiply everything by the number of servings and stir instead of shaking. Make it up to 24 hours ahead (without ice) and refrigerate. The classic Caribbean formula is 1 part sour, 2 parts sweet, 3 parts rum, 4 parts juice.", photo:null, source:"https://www.liquor.com/recipes/rum-punch/" },
  { id:"r23", isSample:false, type:"food", title:"Bacon-Wrapped Filet (Sous Vide + 600F Grill)", category:"treat", description:"Restaurant-style bacon-wrapped filet with precise sous vide doneness, high-heat sear, and pepper-thyme finish butter. Designed for true medium rare with balanced richness.", time:135, ease:3, ingredients:["1 filet mignon (1.5 to 2 inches thick)","kosher salt (slightly reduced due to bacon)","1 slice medium-cut bacon per filet","neutral oil (light coat before grilling)","4 tbsp unsalted butter softened (finish butter)","1/2 tsp freshly cracked black pepper coarse (finish butter)","1/2 tsp finely chopped fresh thyme (finish butter)","pinch flaky salt (finish butter)"], steps:["Salt steak 4-12 hours ahead (or at least 1 hour). Refrigerate uncovered as a dry brine. No butter in the sous vide bag.","Sous vide: cook at 129F for 1.5-2 hours.","Make the pepper-thyme butter: combine softened butter, cracked black pepper, fresh thyme, and a pinch of flaky salt. Set aside.","Remove steak from sous vide. Chill 5-10 minutes uncovered. Pat VERY dry.","Wrap filet with one slice of medium-cut bacon. Stretch slightly and secure with a toothpick if needed.","Lightly oil the wrapped steak. Heat grill to 600F.","Sear bacon edge first, rotating every 60-90 seconds until browned all around. Then sear flat sides 75-90 seconds per side. Total grill time about 4-6 minutes.","Rest 5 minutes. Add a generous coin of pepper-thyme butter during rest.","Slice into 3-4 thick medallions (3/4 to 1 inch). Finish cut faces with light flaky salt. Reassemble and plate leaning against grilled asparagus."], tags:["steak","filet","sous vide","grilling","special occasion","date night"], ratings:{}, cookHistory:[], pairings:["r24","r25"], notes:"Target final temp 131-133F. Bacon should be browned and rendered, not fully crispy - single slice gives better balance. Be generous with the butter. Pairs with Austin Hope Cabernet Sauvignon. Serve with grilled asparagus (lemon finish) and grilled bread.", photo:null, source:"" },

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [recipes, setRecipes] = useState(SAMPLE_RECIPES);
  const [mealPlan, setMealPlan] = useState({});
  const [prefs, setPrefs] = useState({likes:["spicy food","red meat"],dislikes:["chicken thighs","pickles","mustard"]});
  const [trustedSources, setTrustedSources] = useState(DEFAULT_TRUSTED);
  const [syncStatus, setSyncStatus] = useState("connecting");
  const [tab, setTab] = useState("food");
  const [detail, setDetail] = useState(null);
  const [modal, setModal] = useState(null);
  const [pickerDay, setPickerDay] = useState(null);
  const [filters, setFilters] = useState({search:"",category:"all",ease:"all",maxTime:"",minRating:""});

  useEffect(() => {
    db.ref("recipes").once("value").then(snap => {
      if (!snap.exists()) db.ref("recipes").set(SAMPLE_RECIPES);
    }).catch(() => setSyncStatus("error"));
    db.ref("recipes").on("value", snap => { if(snap.exists()){setRecipes(snap.val());setSyncStatus("synced");}});
    db.ref("mealPlan").on("value", snap => { if(snap.exists()) setMealPlan(snap.val()); });
    db.ref("prefs").on("value", snap => { if(snap.exists()) setPrefs(snap.val()); });
    db.ref("trustedSources").on("value", snap => { if(snap.exists()) setTrustedSources(snap.val()); });
    return () => { ["recipes","mealPlan","prefs","trustedSources"].forEach(k => db.ref(k).off()); };
  }, []);

  const saveRecipe = (r) => {
    const updated = recipes.findIndex(x=>x.id===r.id)>=0 ? recipes.map(x=>x.id===r.id?r:x) : [r,...recipes];
    db.ref("recipes").set(updated);
  };
  const updateMealPlan = (fn) => { const next = fn(mealPlan); db.ref("mealPlan").set(next); };
  const addToDay = (day, recipe) => { updateMealPlan(p=>({...p,[day]:[...(p[day]||[]),{id:recipe.id,title:recipe.title}]})); setPickerDay(null); setModal(null); };
  const removeFromDay = (day, i) => updateMealPlan(p=>({...p,[day]:p[day].filter((_,j)=>j!==i)}));

  const type = tab==="cocktails"?"cocktail":"food";
  const filtered = recipes.filter(r => {
    if(r.type!==type) return false;
    if(filters.search && !r.title.toLowerCase().includes(filters.search.toLowerCase()) && !r.description.toLowerCase().includes(filters.search.toLowerCase())) return false;
    if(filters.category!=="all" && r.category!==filters.category) return false;
    if(filters.ease!=="all" && r.ease!==Number(filters.ease)) return false;
    if(filters.maxTime && r.time>Number(filters.maxTime)) return false;
    if(filters.minRating){const a=avgRating(r.ratings);if(!a||Number(a)<Number(filters.minRating))return false;}
    return true;
  });

  return (
    <div className="app">
      <header className="topbar">
        <div className="topbar-brand">our <em>kitchen</em>
          <span style={{marginLeft:8,fontSize:".65rem",opacity:.7,fontFamily:"'Jost',sans-serif",fontWeight:400}}>
            {syncStatus==="connecting"?"⏳":syncStatus==="synced"?"🟢":"🔴"}
          </span>
        </div>
        {["food","cocktails","planner","suggest","export"].map(t=>(
          <button key={t} className={`tab-btn${tab===t?" active":""}`} onClick={()=>setTab(t)}>
            {t==="food"?"📖 Recipes":t==="cocktails"?"🍸 Cocktails":t==="planner"?"🗓 Planner":t==="suggest"?"✨ Suggest":"📤 Export"}
          </button>
        ))}
      </header>
      <main className="content">
        {(tab==="food"||tab==="cocktails") && (
          <>
            <div className="sec-head">
              <h1 className="sec-title">{tab==="cocktails"?"Cocktails & Drinks":"Family Recipes"}</h1>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setModal("import")}>⬆ Import</button>
                <button className="btn btn-primary" onClick={()=>setModal("add")}>+ Add {tab==="cocktails"?"Drink":"Recipe"}</button>
              </div>
            </div>
            <PrefsPanel prefs={prefs} setPrefs={(fn)=>{const next=typeof fn==="function"?fn(prefs):fn;db.ref("prefs").set(next);}} />
            <div className="filters">
              <input className="search-input" placeholder="Search…" value={filters.search} onChange={e=>setFilters(p=>({...p,search:e.target.value}))} />
              <select className="filter-select" value={filters.category} onChange={e=>setFilters(p=>({...p,category:e.target.value}))}>
                <option value="all">All types</option>
                {CATEGORIES.map(c=><option key={c} value={c}>{CAT_LABELS[c]}</option>)}
              </select>
              <select className="filter-select" value={filters.ease} onChange={e=>setFilters(p=>({...p,ease:e.target.value}))}>
                <option value="all">Any ease</option>
                <option value="1">Easy</option><option value="2">Medium</option><option value="3">Hard</option>
              </select>
              <select className="filter-select" value={filters.maxTime} onChange={e=>setFilters(p=>({...p,maxTime:e.target.value}))}>
                <option value="">Any time</option>
                <option value="15">≤15 min</option><option value="30">≤30 min</option>
                <option value="60">≤60 min</option><option value="120">≤2 hr</option>
              </select>
              <select className="filter-select" value={filters.minRating} onChange={e=>setFilters(p=>({...p,minRating:e.target.value}))}>
                <option value="">Any rating</option>
                <option value="4">4+ ★</option><option value="4.5">4.5+ ★</option>
              </select>
            </div>
            {(()=>{
              const myRecipes = filtered.filter(r=>!r.isSample);
              const sampleRecipes = filtered.filter(r=>r.isSample);
              const RecipeCard = (r) => {
                const pairedNames = (r.pairings||[]).map(id=>recipes.find(x=>x.id===id)?.title).filter(Boolean);
                return (
                  <div key={r.id} className="card" onClick={()=>setDetail(r)}>
                    {r.photo && <img src={r.photo} alt={r.title} style={{width:"100%",height:140,objectFit:"cover",borderRadius:8,marginBottom:12}} />}
                    <div className="card-title">{r.title}{r.isSample && <span className="sample-badge">sample</span>}</div>
                    <div className="card-desc">{r.description}</div>
                    {r.source && (()=>{
                      const domain = getSourceDomain(r.source);
                      const isTrusted = trustedSources.some(s=>domain.includes(s)||s.includes(domain));
                      return <div className={`source-badge ${isTrusted?"trusted":"normal"}`}>{isTrusted&&<span className="source-badge-star">★</span>}{domain}</div>;
                    })()}
                    {pairedNames.length>0 && <div style={{fontSize:".73rem",color:"var(--sage)",marginTop:6,display:"flex",alignItems:"center",gap:4}}><span>🍽</span><span>Serve with: {pairedNames.join(", ")}</span></div>}
                    <div className="card-meta" style={{marginTop:8}}>
                      <span className="pill pill-cat" style={{background:CAT_COLORS[r.category]}}>{CAT_LABELS[r.category]}</span>
                      {r.tags.slice(0,2).map(t=><span key={t} className="pill pill-tag">{t}</span>)}
                      {avgRating(r.ratings)&&<span style={{fontSize:".75rem",color:"#c49a2a",marginLeft:2}}>★ {avgRating(r.ratings)}</span>}
                      <span className="time-chip">⏱ {r.time}m</span>
                    </div>
                    {r.isSample && (
                      <button className="btn btn-ghost btn-sm" style={{marginTop:10,width:"100%",justifyContent:"center"}}
                        onClick={e=>{e.stopPropagation();saveRecipe({...r,isSample:false});}}>
                        + Add to my recipes
                      </button>
                    )}
                  </div>
                );
              };
              return (
                <div className="grid">
                  {myRecipes.length===0&&sampleRecipes.length===0&&<p style={{color:"var(--muted)",fontSize:".9rem",gridColumn:"1/-1",padding:"20px 0"}}>No recipes match your filters.</p>}
                  {myRecipes.map(r=>RecipeCard(r))}
                  {sampleRecipes.length>0&&<div className="sample-divider"><div className="sample-divider-line"/><div className="sample-divider-label">✦ Sample Recipes — add your own above</div><div className="sample-divider-line"/></div>}
                  {sampleRecipes.map(r=>RecipeCard(r))}
                </div>
              );
            })()}
          </>
        )}
        {tab==="planner" && (
          <PlannerTab
            mealPlan={mealPlan} recipes={recipes}
            addToDay={addToDay} removeFromDay={removeFromDay}
            pickerDay={pickerDay} setPickerDay={setPickerDay}
            modal={modal} setModal={setModal}
            updateMealPlan={updateMealPlan}
            prefs={prefs}
          />
        )}
        {tab==="suggest" && <AISuggest recipes={recipes} prefs={prefs} onSaveRecipe={saveRecipe} />}
        {tab==="export" && <ExportPanel recipes={recipes} setRecipes={(d)=>db.ref("recipes").set(d)} trustedSources={trustedSources} setTrustedSources={(fn)=>{const next=typeof fn==="function"?fn(trustedSources):fn;db.ref("trustedSources").set(next);}} />}
      </main>
      {detail&&<RecipeDetail recipe={detail} allRecipes={recipes} trustedSources={trustedSources} onClose={()=>setDetail(null)} onSave={(r)=>{saveRecipe(r);setDetail(r);}} />}
      {modal==="add"&&<RecipeForm type={type} onClose={()=>setModal(null)} onSave={(r)=>{saveRecipe(r);setModal(null);}} />}
      {modal==="import"&&<ImportModal onClose={()=>setModal(null)} onSave={(r)=>{saveRecipe(r);setModal(null);}} />}
      {modal==="aiMeal"&&<AIMealModal recipes={recipes} mealPlan={mealPlan} prefs={prefs} onClose={()=>setModal(null)} />}
    </div>
  );
}


// ─── Planner Tab ──────────────────────────────────────────────────────────────
function PlannerTab({ mealPlan, recipes, addToDay, removeFromDay, pickerDay, setPickerDay, modal, setModal, updateMealPlan, prefs }) {
  const [groceryModal, setGroceryModal] = useState(false);
  const [groceryList, setGroceryList] = useState(null);
  const [groceryLoading, setGroceryLoading] = useState(false);
  const [checked, setChecked] = useState({});
  const [manualItems, setManualItems] = useState([]);
  const [manualInput, setManualInput] = useState("");
  const [newSlotName, setNewSlotName] = useState("");
  const [addingSlot, setAddingSlot] = useState(false);

  const customSlots = mealPlan.__customSlots__ || [];

  const addCustomSlot = () => {
    const name = newSlotName.trim();
    if (!name) return;
    updateMealPlan(p => ({...p, __customSlots__: [...(p.__customSlots__||[]), name], [name]: p[name]||[]}));
    setNewSlotName(""); setAddingSlot(false);
  };

  const removeCustomSlot = (name) => {
    updateMealPlan(p => {
      const next = {...p};
      const slots = (p.__customSlots__||[]).filter(s=>s!==name);
      next.__customSlots__ = slots;
      delete next[name];
      return next;
    });
  };

  const renameCustomSlot = (oldName, newName) => {
    if (!newName.trim() || newName === oldName) return;
    updateMealPlan(p => {
      const next = {...p};
      next.__customSlots__ = (p.__customSlots__||[]).map(s=>s===oldName?newName:s);
      next[newName] = p[oldName]||[];
      delete next[oldName];
      return next;
    });
  };



  const buildFallbackList = (plannedRecipes) => {
    const CATS = {
      "Produce": ["lemon","lime","onion","garlic","tomato","pepper","basil","cilantro","parsley","thyme","broccoli","asparagus","spinach","carrot","ginger","scallion","green onion","apple","strawberr","avocado"],
      "Meat & Seafood": ["chicken","beef","steak","pork","lamb","turkey","shrimp","fish","salmon","bacon","sausage","ground","filet","tip"],
      "Dairy & Eggs": ["egg","butter","milk","cream","cheese","mozzarella","romano","parmesan","ricotta","yogurt"],
      "Bread & Bakery": ["bread","tortilla","baguette","sourdough","noodle","pasta","ziti","rigatoni","lasagna","vermicelli","rice","waffle"],
      "Pantry & Dry Goods": ["flour","sugar","salt","oil","olive oil","broth","stock","can","tomato sauce","coconut milk","honey","syrup","vinegar","cornstarch"],
      "Condiments & Sauces": ["sauce","marinade","hot sauce","fish sauce","worcestershire","grenadine","salsa"],
      "Spices & Herbs": ["pepper","cumin","oregano","paprika","cinnamon","cayenne","chili","spice","seasoning","bitters","vanilla","nutmeg"],
      "Beverages": ["wine","beer","rum","gin","bourbon","tequila","vodka","juice"],
    };
    const categorized = {};
    const seen = new Set();
    Object.keys(CATS).forEach(c => { categorized[c] = []; });
    categorized["Other"] = [];
    const allIngredients = [];
    plannedRecipes.forEach(r => (r.ingredients||[]).forEach(ing => allIngredients.push(ing)));
    const deduped = [];
    allIngredients.forEach(ing => {
      const key = ing.toLowerCase().replace(/[^a-z]/g,"").slice(0,10);
      if (!seen.has(key)) { seen.add(key); deduped.push(ing); }
    });
    deduped.forEach(ing => {
      const lower = ing.toLowerCase();
      let placed = false;
      for (const [cat, keywords] of Object.entries(CATS)) {
        if (keywords.some(k => lower.includes(k))) { categorized[cat].push(ing); placed = true; break; }
      }
      if (!placed) categorized["Other"].push(ing);
    });
    return { categories: Object.entries(categorized).filter(([,items])=>items.length>0).map(([name,items])=>({name,items})), fallback: true };
  };

  const generateGroceryList = async () => {
    setGroceryLoading(true); setGroceryModal(true); setGroceryList(null); setChecked({}); setManualItems([]);
    const allSlots = [...DAYS, ...customSlots];
    const plannedIds = new Set();
    allSlots.forEach(slot => (mealPlan[slot]||[]).forEach(item => plannedIds.add(item.id)));
    const plannedRecipes = recipes.filter(r => plannedIds.has(r.id));
    if (plannedRecipes.length === 0) { setGroceryList({error:"No recipes planned yet."}); setGroceryLoading(false); return; }
    const ingredientList = plannedRecipes.map(r => r.title + ": " + (r.ingredients||[]).join(", ")).join("\n");
    try {
      const res = await fetch("https://lucky-bonus-4a7a.christopher-a-daggett.workers.dev", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:2000,
          system:"You are a helpful grocery list organizer. Consolidate and deduplicate ingredients from multiple recipes. Group into: Produce, Meat & Seafood, Dairy & Eggs, Pantry & Dry Goods, Condiments & Sauces, Spices & Herbs, Bread & Bakery, Beverages, Other. Return ONLY valid JSON: {\"categories\": [{\"name\": \"Produce\", \"items\": [\"2 lemons\"]}]}. No markdown.",
          messages:[{role:"user", content:"Recipes and ingredients:\n" + ingredientList}]
        })
      });
      if (!res.ok) throw new Error("unavailable");
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const raw = data.content?.[0]?.text||"{}";
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setGroceryList(parsed);
    } catch(e) {
      setGroceryList(buildFallbackList(plannedRecipes));
    }

  };

      <div className="planner-grid">
        {DAYS.map(day=><PlanCol key={day} slotKey={day} label={day.slice(0,3)} isCustom={false} />)}

        <div>
          {addingSlot ? (
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <input className="finput" placeholder="Slot name…" value={newSlotName}
                onChange={e=>setNewSlotName(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")addCustomSlot();if(e.key==="Escape"){setAddingSlot(false);setNewSlotName("");}}}
                autoFocus style={{flex:1,padding:"6px 10px",fontSize:".8rem"}} />
              <button className="btn btn-primary btn-sm" onClick={addCustomSlot}>Add</button>
              <button className="btn btn-secondary btn-sm" onClick={()=>{setAddingSlot(false);setNewSlotName("");}}>✕</button>
            </div>
          ) : (
            <button className="add-slot-btn" onClick={()=>setAddingSlot(true)}>+ Add slot</button>
          )}
        </div>
      </div>

      {modal==="pick"&&pickerDay&&(
        <div className="overlay" onClick={()=>{setModal(null);setPickerDay(null);}}>
          <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>

            </div>
            <div className="modal-body">
              <div className="picker-list">
                {recipes.filter(r=>r.type==="food").map(r=>(
                  <button key={r.id} className="picker-item" onClick={()=>addToDay(pickerDay,r)}>
                    <span>{r.title}</span>

            </div>

      {groceryModal && (

            </div>
            <div className="modal-body">
              {groceryLoading && <div className="typing"><span/><span/><span/><span style={{marginLeft:8,fontSize:".82rem",color:"var(--muted)"}}>Building your list…</span></div>}

                  <div className="grocery-category-label">{cat.name}</div>

                "**Ingredients**",
                ...(r.ingredients||[]).map(i=>`- ${i}`),
                "",
                "**Method**",
                ...(r.steps||[]).map((s,i)=>`${i+1}. ${s}`),
                r.tweaks ? "\n**My Tweaks**\n" + r.tweaks : "",
                r.notes ? "\n**Notes**\n" + r.notes : "",
              ].filter(l=>l!==undefined).join("\n");
              navigator.clipboard.writeText(text).then(()=>alert("Copied to clipboard! Ready to paste into Google Docs.")).catch(()=>alert("Copy failed — try the text export instead."));
            }}>📋 Copy for Google Docs</button>
          </div>
        </div>
      </div>
    </div>
  );
}
