function ImportModal({ onClose, onSave }) {
  const [mode, setMode] = useState("url");
  const [url, setUrl] = useState("");
  const [text, setText] = useState("");
  const [json, setJson] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");

  const extractFromAI = async (prompt, sourceUrl="") => {
    const res = await fetch("https://lucky-bonus-4a7a.christopher-a-daggett.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1500,
        system:"You are a recipe extractor. The user will give you a URL or text. Use your training knowledge to extract or reconstruct the recipe. Return ONLY a valid JSON object with NO other text, NO markdown, NO explanation. Use these exact keys: title (string), description (string), ingredients (array of strings), steps (array of strings), time (number in minutes), ease (1=easy 2=medium 3=hard), category (everyday or healthy or treat or holiday), tags (array of strings), notes (string). If given a URL you cannot access, use your knowledge of that recipe site and URL to infer the recipe.",
        messages:[{role:"user",content:prompt}]
      })
    });
    if (!res.ok) { const t = await res.text(); throw new Error(`Server error ${res.status}: ${t.slice(0,150)}`); }
    const data = await res.json();
    if (data.error) throw new Error(`API error: ${data.error}`);
    const raw = data.content?.[0]?.text||"{}";
    // Robust JSON extraction - finds first { ... } block even if surrounded by text
    let parsed;
    try {
      // First try: strip markdown fences and parse directly
      const clean = raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
      parsed = JSON.parse(clean);
    } catch(e1) {
      try {
        // Second try: find the JSON object within the text
        const match = raw.match(/\{[\s\S]*\}/);
        if (!match) throw new Error("No JSON object found in response");
        parsed = JSON.parse(match[0]);
      } catch(e2) {
        throw new Error("Could not parse recipe from response. Raw: " + raw.slice(0,200));
      }
    }
    return { id:genId(), type:"food", photo:null, ratings:{}, cookHistory:[], pairings:[], isSample:false,
      source: sourceUrl,
      ...parsed,
      ingredients: Array.isArray(parsed.ingredients)?parsed.ingredients:parsed.ingredients?.split("\n")||[],
      steps: Array.isArray(parsed.steps)?parsed.steps:parsed.steps?.split("\n")||[],
      tags: Array.isArray(parsed.tags)?parsed.tags:[],
      time: Number(parsed.time)||30, ease: Number(parsed.ease)||1,
    };
  };



  const handleSingleImport = async () => {
    setLoading(true); setError(""); setResult(null);
    try {
      const prompt = mode==="url"
        ? `Extract the recipe from this URL: ${url}`
        : `Extract the recipe from this text:\n\n${text}`;
      const recipe = await extractFromAI(prompt, url);
      setResult(recipe);
    } catch(e) { setError(String(e.message || "Could not parse recipe. Please try again.").slice(0,200)); }
    setLoading(false);
  };

  const handleJsonImport = () => {
    try {
      const p = JSON.parse(json);
      if(Array.isArray(p)) { p.forEach(r=>onSave({...r,id:genId(),type:"food",ratings:{},cookHistory:[],pairings:[],isSample:false})); onClose(); }
      else { setResult(p); }
    } catch { setError("Invalid JSON."); }
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:560}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title" style={{fontSize:"1.4rem"}}>Import Recipes</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="import-tabs">
            {["url","text","json"].map(m=>(
              <button key={m} className={`imp-tab${mode===m?" active":""}`} onClick={()=>{setMode(m);setResult(null);setError("");}}>
                {m==="url"?"🌐 URL":m==="text"?"📝 Paste text":"📦 JSON backup"}
              </button>
            ))}
          </div>

          {/* ── SINGLE URL ── */}
          {mode==="url" && <>
            <div className="field"><label>Website or Google Doc URL</label>
              <input className="finput" value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://…" />
            </div>
            {error && <p style={{color:"var(--terra)",fontSize:".82rem",marginTop:8}}>{error}</p>}
            {result && !loading && (
              <div style={{background:"var(--bg)",borderRadius:8,padding:14,marginTop:14,fontSize:".85rem"}}>
                <strong style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.1rem"}}>{result.title}</strong>
                <p style={{color:"var(--muted)",marginTop:4,lineHeight:1.5}}>{result.description}</p>
                <p style={{fontSize:".78rem",color:"var(--muted)",marginTop:6}}>✓ {result.ingredients?.length||0} ingredients · {result.steps?.length||0} steps · {result.time}min</p>
              </div>
            )}
            {loading && <div className="typing" style={{marginTop:14}}><span/><span/><span/><span style={{marginLeft:6,fontSize:".82rem",color:"var(--muted)"}}>Extracting…</span></div>}
            <div className="form-actions">
              {!result && <button className="btn btn-primary" onClick={handleSingleImport} disabled={loading||!url.trim()}>Import</button>}
              {result && <button className="btn btn-primary" onClick={()=>{onSave(result);onClose();}}>✓ Save Recipe</button>}
              <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
            </div>
          </>}

          {/* ── TEXT ── */}
          {mode==="text" && <>
            <div className="field"><label>Paste recipe text</label>
              <textarea className="ftextarea" style={{minHeight:140}} value={text} onChange={e=>setText(e.target.value)} placeholder="Paste any text with a recipe…" />
            </div>
            {error && <p style={{color:"var(--terra)",fontSize:".82rem",marginTop:8}}>{error}</p>}
            {result && !loading && (
              <div style={{background:"var(--bg)",borderRadius:8,padding:14,marginTop:14,fontSize:".85rem"}}>
                <strong style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.1rem"}}>{result.title}</strong>
                <p style={{color:"var(--muted)",marginTop:4}}>{result.description}</p>
              </div>
            )}
            {loading && <div className="typing" style={{marginTop:14}}><span/><span/><span/></div>}
            <div className="form-actions">
              {!result && <button className="btn btn-primary" onClick={handleSingleImport} disabled={loading||!text.trim()}>Import</button>}
              {result && <button className="btn btn-primary" onClick={()=>{onSave(result);onClose();}}>✓ Save Recipe</button>}
              <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
            </div>
          </>}

          {/* ── JSON ── */}
          {mode==="json" && <>
            <div className="field"><label>Paste exported JSON backup</label>
              <textarea className="ftextarea" style={{minHeight:140}} value={json} onChange={e=>setJson(e.target.value)} placeholder='[{"title":"…",…}]' />
            </div>
            {error && <p style={{color:"var(--terra)",fontSize:".82rem",marginTop:8}}>{error}</p>}
            <div className="form-actions">
              <button className="btn btn-primary" onClick={handleJsonImport} disabled={!json.trim()}>Import</button>
              <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
            </div>
          </>}
        </div>
      </div>
    </div>
  );
}

// ─── Preferences Panel ────────────────────────────────────────────────────────
function PrefsPanel({ prefs, setPrefs }) {
  const [likeInput, setLikeInput] = useState("");
  const [dislikeInput, setDislikeInput] = useState("");
  const [open, setOpen] = useState(false);

  const addLike = () => { const v = likeInput.trim(); if(!v) return; setPrefs(p=>({...p,likes:[...p.likes.filter(x=>x!==v),v]})); setLikeInput(""); };
  const addDislike = () => { const v = dislikeInput.trim(); if(!v) return; setPrefs(p=>({...p,dislikes:[...p.dislikes.filter(x=>x!==v),v]})); setDislikeInput(""); };
  const removeLike = (v) => setPrefs(p=>({...p,likes:p.likes.filter(x=>x!==v)}));
  const removeDislike = (v) => setPrefs(p=>({...p,dislikes:p.dislikes.filter(x=>x!==v)}));

  return (
    <div className="prefs-panel" style={{marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
        <div>
          <div className="prefs-title">👨‍🍳 Family Food Preferences</div>
          <div className="prefs-sub">Used by the AI to personalize suggestions · {prefs.likes.length} likes, {prefs.dislikes.length} dislikes saved</div>
        </div>
        <span style={{color:"var(--muted)",fontSize:"1.1rem",transition:"transform .2s",transform:open?"rotate(180deg)":"none"}}>▾</span>
      </div>
      {open && (
        <div className="prefs-cols" style={{marginTop:14}}>
          <div>
            <div className="prefs-col-label likes">✓ We love</div>
            <div className="prefs-tags">
              {prefs.likes.map(v=>(
                <span key={v} className="pref-tag like">{v}<button onClick={()=>removeLike(v)}>✕</button></span>
              ))}
              {prefs.likes.length===0 && <span style={{fontSize:".75rem",color:"var(--muted)"}}>Nothing added yet</span>}
            </div>
            <div className="pref-input-row">
              <input className="pref-input" placeholder="e.g. spicy food, red meat…" value={likeInput} onChange={e=>setLikeInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addLike()} />
              <button className="pref-add like" onClick={addLike}>+ Add</button>
            </div>
          </div>
          <div>
            <div className="prefs-col-label dislikes">✕ We avoid</div>
            <div className="prefs-tags">
              {prefs.dislikes.map(v=>(
                <span key={v} className="pref-tag dislike">{v}<button onClick={()=>removeDislike(v)}>✕</button></span>
              ))}
              {prefs.dislikes.length===0 && <span style={{fontSize:".75rem",color:"var(--muted)"}}>Nothing added yet</span>}
            </div>
            <div className="pref-input-row">
              <input className="pref-input dislike" placeholder="e.g. pickles, mustard…" value={dislikeInput} onChange={e=>setDislikeInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addDislike()} />
              <button className="pref-add dislike" onClick={addDislike}>+ Add</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── AI Suggest ───────────────────────────────────────────────────────────────
function AISuggest({ recipes, prefs, onSaveRecipe }) {
  const [prompt, setPrompt] = useState("");
  const [result, setResult] = useState("");
  const [suggestions, setSuggestions] = useState([]);
  const [loading, setLoading] = useState(false);
  const [savingIdx, setSavingIdx] = useState(null);
  const [savedIdxs, setSavedIdxs] = useState([]);

  const ask = async () => {
    if(!prompt.trim()) return;
    setLoading(true); setResult(""); setSuggestions([]); setSavedIdxs([]);
    const context = recipes.filter(r=>!r.isSample).slice(0,8).map(r=>`${r.title} (${r.category}, ${r.time}min)`).join(", ") || "none yet";
    const likesStr = prefs.likes.length ? prefs.likes.join(", ") : "none specified";
    const dislikesStr = prefs.dislikes.length ? prefs.dislikes.join(", ") : "none specified";
    try {
      const res = await fetch("https://lucky-bonus-4a7a.christopher-a-daggett.workers.dev",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1500,
          system:`You are a warm, creative home cooking assistant for a family. Their existing recipes include: ${context}. Family food preferences — they LOVE: ${likesStr}. They AVOID or dislike: ${dislikesStr}. Never suggest recipes that feature the avoided items. Suggest 2-3 recipe ideas. Return ONLY valid JSON array, no markdown: [{"title":"...","description":"...","category":"everyday","time":30,"ease":1,"ingredients":["..."],"steps":["..."],"tags":["..."],"notes":"..."}]. ease: 1=easy,2=medium,3=hard. category: everyday/healthy/treat/holiday.`,
          messages:[{role:"user",content:prompt}]
        })
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text||"[]";
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      if(Array.isArray(parsed)) setSuggestions(parsed);
      else setResult(raw);
    } catch(e) { setResult("Couldn't reach AI. Please try again."); }
    setLoading(false);
  };

  const saveRecipe = async (s, idx) => {
    setSavingIdx(idx);
    const recipe = { id:genId(), isSample:false, type:"food", photo:null, ratings:{}, cookHistory:[], pairings:[], source:"",
      ...s, time:Number(s.time)||30, ease:Number(s.ease)||1,
      ingredients:Array.isArray(s.ingredients)?s.ingredients:[],
      steps:Array.isArray(s.steps)?s.steps:[],
      tags:Array.isArray(s.tags)?s.tags:[],
    };
    onSaveRecipe(recipe);
    setSavedIdxs(p=>[...p,idx]);
    setSavingIdx(null);
  };

  return (
    <>
      <h1 className="sec-title" style={{marginBottom:24}}>AI Recipe Suggestions</h1>
      <div className="ai-box">
        <div className="ai-box-title">What should we cook?</div>
        <div className="ai-box-sub">Describe ingredients on hand, a craving, dietary needs, how much time you have…</div>
        <div className="ai-row">
          <input className="ai-input" value={prompt} onChange={e=>setPrompt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&ask()} placeholder="e.g. Something the kids will love, under 30 minutes, we have chicken…" />
          <button className="ai-go" onClick={ask} disabled={loading||!prompt.trim()}>{loading?"Thinking…":"Suggest →"}</button>
        </div>
        {loading && <div className="typing"><span/><span/><span/></div>}
        {result && <div className="ai-result">{result}</div>}
      </div>

      {suggestions.length > 0 && (
        <div style={{marginTop:24,display:"flex",flexDirection:"column",gap:16}}>
          {suggestions.map((s,i)=>(
            <div key={i} style={{background:"white",border:"1px solid var(--border)",borderRadius:12,padding:20}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:8}}>
                <div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.3rem",color:"var(--ink)"}}>{s.title}</div>
                  <div style={{fontSize:".82rem",color:"var(--muted)",marginTop:3}}>{s.description}</div>
                </div>
                <button className="btn btn-primary btn-sm" style={{whiteSpace:"nowrap",flexShrink:0}}
                  onClick={()=>saveRecipe(s,i)}
                  disabled={savingIdx===i||savedIdxs.includes(i)}>
                  {savedIdxs.includes(i)?"✓ Saved":savingIdx===i?"Saving…":"+ Save recipe"}
                </button>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                <span className="pill pill-cat" style={{background:CAT_COLORS[s.category]||"#4a7c59"}}>{CAT_LABELS[s.category]||s.category}</span>
                <span className="time-chip">⏱ {s.time}m</span>
                <span className="time-chip">{["Easy","Medium","Hard"][s.ease-1]||""}</span>
              </div>
              {s.ingredients?.length>0 && <>
                <div style={{fontSize:".7rem",fontWeight:600,textTransform:"uppercase",letterSpacing:".08em",color:"var(--terra)",marginBottom:6}}>Ingredients</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3,marginBottom:10}}>
                  {s.ingredients.map((ing,j)=><div key={j} style={{fontSize:".82rem",color:"#3a2e22",display:"flex",alignItems:"center",gap:5}}><span style={{width:5,height:5,borderRadius:"50%",background:"var(--terra)",flexShrink:0,display:"inline-block"}}></span>{ing}</div>)}
                </div>
              </>}
              {s.steps?.length>0 && <>
                <div style={{fontSize:".7rem",fontWeight:600,textTransform:"uppercase",letterSpacing:".08em",color:"var(--terra)",marginBottom:6}}>Method</div>
                {s.steps.map((step,j)=>(
                  <div key={j} style={{display:"flex",gap:10,marginBottom:6,fontSize:".84rem",color:"#3a2e22"}}>
                    <div style={{width:20,height:20,background:"var(--terra)",color:"white",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".68rem",fontWeight:600,flexShrink:0,marginTop:1}}>{j+1}</div>
                    <div>{step}</div>
                  </div>
                ))}
              </>}
            </div>
          ))}
        </div>
      )}
    </>
  );
}

// ─── AI Meal Modal ────────────────────────────────────────────────────────────
function AIMealModal({ recipes, mealPlan, prefs, onClose }) {
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    const ask = async () => {
      setLoading(true);
      const recipeList = recipes.filter(r=>r.type==="food").map(r=>{
        const avg = avgRating(r.ratings);
        const kidRatings = ["Nora","Elizabeth","Luke"].map(k=>r.ratings?.[k]).filter(Boolean);
        const kidAvg = kidRatings.length ? (kidRatings.reduce((a,b)=>a+b,0)/kidRatings.length).toFixed(1) : "unrated";
        const lastCooked = r.cookHistory?.slice(-1)[0]||"never";
        return `- ${r.title} (category:${r.category}, time:${r.time}min, ease:${EASE_LABELS[r.ease]}, family avg:${avg||"unrated"}, kids avg:${kidAvg}, last cooked:${lastCooked})`;
      }).join("\n");
      const planned = Object.entries(mealPlan).filter(([,v])=>v?.length>0).map(([d,v])=>`${d}: ${v.map(x=>x.title).join(", ")}`).join("\n")||"nothing planned yet";
      const likesStr = prefs?.likes?.length ? prefs.likes.join(", ") : "none specified";
      const dislikesStr = prefs?.dislikes?.length ? prefs.dislikes.join(", ") : "none specified";
      try {
        const res = await fetch("https://lucky-bonus-4a7a.christopher-a-daggett.workers.dev",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            model:"claude-sonnet-4-20250514",
            max_tokens:1200,
            system:`You are a helpful family meal planner. Today is Saturday — planning day. Family food preferences — they LOVE: ${likesStr}. They AVOID: ${dislikesStr}. Never suggest meals featuring avoided items. Lean into what they love. Suggest a balanced week of meals (Mon-Fri dinners, plus Sat/Sun). Consider: variety, kid-friendliness, ingredient overlap to minimize shopping, health balance, and time constraints on weeknights. Be specific and friendly.`,
            messages:[{role:"user",content:`Here are our recipes:\n${recipeList}\n\nCurrently planned:\n${planned}\n\nPlease suggest a meal plan for the week with brief reasoning for each pick.`}]
          })
        });
        const data = await res.json();
        setResult(data.content?.[0]?.text||"No suggestions.");
      } catch { setResult("Couldn't reach AI. Please try again."); }
      setLoading(false);
    };
    ask();
  }, []);

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:580}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title" style={{fontSize:"1.4rem"}}>✨ Saturday Meal Planning</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {loading && <><div className="typing"><span/><span/><span/></div><p style={{fontSize:".82rem",color:"var(--muted)",marginTop:10}}>Analyzing your recipes, cook history, and family preferences…</p></>}
          {result && <div style={{fontSize:".88rem",lineHeight:1.75,color:"var(--ink)",whiteSpace:"pre-wrap"}}>{result}</div>}
        </div>
      </div>
    </div>
  );
}

// ─── Export Panel ─────────────────────────────────────────────────────────────
function ExportPanel({ recipes, setRecipes, trustedSources, setTrustedSources }) {
  const [newSource, setNewSource] = useState("");
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(recipes, null, 2)], {type:"application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "our_recipes.json"; a.click();
  };

  const exportText = () => {
    const lines = recipes.map(r=>[
      `== ${r.title} ==`,
      `Category: ${CAT_LABELS[r.category]} | Time: ${r.time}min | Ease: ${EASE_LABELS[r.ease]||""}`,
      r.description,
      "",
      "INGREDIENTS:",
      ...(r.ingredients||[]).map(i=>`  • ${i}`),
      "",
      "METHOD:",
      ...(r.steps||[]).map((s,i)=>`  ${i+1}. ${s}`),
      r.notes ? `\nNotes: ${r.notes}` : "",
      "",
      "---",""
    ].join("\n"));
    const blob = new Blob([lines.join("\n")],{type:"text/plain"});
    const a = document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="our_recipes.txt"; a.click();
  };

  const handleImportJSON = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if(Array.isArray(imported)) {
          setRecipes(prev => {
            const ids = new Set(prev.map(r=>r.id));
            const newOnes = imported.filter(r=>!ids.has(r.id));
            return [...prev, ...newOnes];
          });
          alert(`✓ Imported ${imported.length} recipes.`);
        }
      } catch { alert("Invalid JSON file."); }
    };
    reader.readAsText(file);
  };

  const foodCount = recipes.filter(r=>r.type==="food").length;
  const cocktailCount = recipes.filter(r=>r.type==="cocktail").length;

  return (
    <>
      <h1 className="sec-title" style={{marginBottom:24}}>Export & Backup</h1>
      <div className="export-panel">
        <div className="export-title">📦 Full Data Backup (JSON)</div>
        <div className="export-desc">Exports all {recipes.length} recipes ({foodCount} food, {cocktailCount} cocktails) with ratings, cook history, and notes. Use this to back up your data, share with your wife, or migrate to a full app later (Firebase-ready format).</div>
        <div className="export-actions">
          <button className="btn btn-primary" onClick={exportJSON}>⬇ Download JSON</button>
        </div>
      </div>
      <div className="export-panel">
        <div className="export-title">📄 Plain Text (for Google Docs)</div>
        <div className="export-desc">Exports all recipes as clean, readable text — perfect for pasting into a Google Doc, printing, or archiving. Great for preserving family recipes if you ever move away from this app.</div>
        <div className="export-actions">
          <button className="btn btn-primary" onClick={exportText}>⬇ Download .txt</button>
        </div>
      </div>
      <div className="export-panel">
        <div className="export-title">⬆ Import from JSON backup</div>
        <div className="export-desc">Load a previously exported JSON file to restore recipes or merge in recipes from another device. Duplicate IDs are skipped automatically.</div>
        <div className="export-actions">
          <label className="btn btn-secondary" style={{cursor:"pointer"}}>
            Choose File <input type="file" accept=".json" style={{display:"none"}} onChange={handleImportJSON} />
          </label>
        </div>
      </div>
      <div className="export-panel">
        <div className="export-title">⭐ Trusted Sources</div>
        <div className="export-desc">Sources you trust get a ★ badge on recipe cards and in the detail view. Great for knowing at a glance if a cocktail is from liquor.com vs a random blog.</div>
        <div className="trusted-row">
          {trustedSources.map(s=>(
            <span key={s} className="trusted-chip">
              ★ {s}
              <button onClick={()=>setTrustedSources(p=>p.filter(x=>x!==s))}>✕</button>
            </span>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input className="finput" style={{maxWidth:260}} placeholder="e.g. liquor.com" value={newSource} onChange={e=>setNewSource(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&newSource.trim()){setTrustedSources(p=>[...p.filter(x=>x!==newSource.trim()),newSource.trim()]);setNewSource("");}}} />
          <button className="btn btn-secondary" onClick={()=>{if(newSource.trim()){setTrustedSources(p=>[...p.filter(x=>x!==newSource.trim()),newSource.trim()]);setNewSource("");}}}>+ Add</button>
        </div>
      </div>
      <div style={{background:"var(--warm)",borderRadius:12,padding:16,fontSize:".82rem",color:"var(--muted)",lineHeight:1.6}}>
        <strong style={{color:"var(--ink)"}}>🔮 Firebase migration path:</strong> When you're ready to sync across devices, the JSON export is the exact format needed to seed a Firebase Realtime Database or Firestore collection. Just let me know and I can help you set that up.
      </div>
    </>
  );
}
